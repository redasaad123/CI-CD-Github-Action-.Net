name: Deploy Application
on:
  workflow_call:
    inputs:
      app_name:
        description: 'Name of the application'
        required: true
        type: string

    secrets: # لازم تعرفهم هنا عشان الـ Workflow يشوفهم
      IP_MASTER:
        required: true
      SSH_Key:
        required: true
      
      SSH_USER:
        required: false
      
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    
    steps:
      

      - name: Checkout DevOps Repo (Docker Compose)
        uses: actions/checkout@v3


      # 🔐 Setup SSH باستخدام Key بدل Password 
      - name: Setup SSH Agent 
        uses: webfactory/ssh-agent@v0.8.0 
        with: 
          ssh-private-key: ${{ secrets.SSH_Key }}
        


      - name: Setup SSH Configuration
        run: |
          if [ -z "${{ secrets.IP_MASTER }}" ]; then
            echo "❌ Missing IP_MASTER secret"
            exit 1
          fi
          
          
          # Set default user to root if SSH_USER not provided
          SSH_USER="${{ secrets.SSH_USER }}"
          if [ -z "$SSH_USER" ]; then
            SSH_USER="root"
          fi
          echo "SSH_USER=$SSH_USER" >> $GITHUB_ENV
          
          
          
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.IP_MASTER }} >> ~/.ssh/known_hosts


      - name: Test SSH Connection
        run: |
          if ssh  $SSH_USER@${{ secrets.IP_MASTER }} "echo 'SSH connection successful!'"; then
            echo "✅ SSH connection to ${{ secrets.IP_MASTER }} successful"
          else
            echo "❌ SSH connection to ${{ secrets.IP_MASTER }} failed"
            exit 1
          fi

      - name:  copy docker-compose file to remote server
        run: |

          TARGET_DIR="/root"
          scp  docker-compose.yml $SSH_USER@${{ secrets.IP_MASTER }}:/root/docker-compose.yml
          scp nginx/nginx.conf $SSH_USER@${{ secrets.IP_MASTER }}:$TARGET_DIR/nginx/nginx.conf
          

      - name: Deploy
        run: |
          ssh $SSH_USER@${{ secrets.IP_MASTER }} "
            cd /root && \
            docker compose pull && \
            docker compose down && \
            docker compose up -d
          "


        

      
        

  
        